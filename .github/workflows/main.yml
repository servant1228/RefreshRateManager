name: RefreshRateManager CI

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 接受 Android SDK 许可证
        run: |
          yes | sdkmanager --licenses || true

      - name: 授予 Gradle 执行权限
        run: chmod +x gradlew

      - name: 构建 ${{ github.event.inputs.build_type || 'release' }} APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          if [ "$BUILD_TYPE" = "release" ]; then
            # 解码签名密钥
            if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
              echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks
              echo "✅ 密钥已解码"
            fi
            ./gradlew :app:assembleRelease \
              -PKEY_STORE_PASSWORD="${{ secrets.KEY_STORE_PASSWORD }}" \
              -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
              -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
          else
            ./gradlew :app:assembleDebug
          fi
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 上传 APK 文件
        uses: actions/upload-artifact@v4
        with:
          name: RefreshRateManager-${{ github.event.inputs.build_type || 'release' }}-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error

